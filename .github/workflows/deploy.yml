name: Deploy to server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SCP
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H $HOST >> ~/.ssh/known_hosts 2>/dev/null
          scp RecipeHub-App-v2.html root@$HOST:/var/www/recipehub/RecipeHub-App-v2.html
          ssh root@$HOST "cp /var/www/recipehub/RecipeHub-App-v2.html /var/www/recipehub/index.html"
