name: Deploy to server

on:
  push:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run smoke tests
        run: node tests/smoke.js

  deploy:
    needs: smoke      # do not deploy if smoke failed
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SCP
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H $HOST >> ~/.ssh/known_hosts 2>/dev/null
          TS=$(date +%s)000   # ms since epoch — stamped into <meta name="rh-build">
          sed "s/__RH_BUILD__/$TS/" RecipeHub-App-v2.html > /tmp/rh-deploy.html
          scp /tmp/rh-deploy.html root@$HOST:/var/www/recipehub/RecipeHub-App-v2.html
          ssh root@$HOST "cp /var/www/recipehub/RecipeHub-App-v2.html /var/www/recipehub/index.html"
          echo "Deployed build $TS"
